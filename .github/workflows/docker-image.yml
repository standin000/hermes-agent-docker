name: Docker Image CI
on:
  workflow_dispatch:

env:
  REGISTRY: crpi-ikj5c5lyfhxbb8iy.cn-shanghai.personal.cr.aliyuncs.com
  IMAGE_NAME:  ${{ secrets.DOCKER_USERNAME }}/hermes-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # Buildx provice good build and cache performance
        
      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha # Enable GitHub Actions cache，speed up build again.
          cache-to: type=gha,mode=max
